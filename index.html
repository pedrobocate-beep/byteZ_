<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>byteZ | Hub de Jogos</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        header h1 {
            font-size: 4rem;
            color: var(--primary);
            text-transform: lowercase;
            letter-spacing: -3px;
            margin: 0;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        header p { opacity: 0.6; margin-top: 5px; }

        .btn-add {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-add:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-color: var(--primary);
        }

        .game-thumb {
            width: 100%;
            height: 160px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-bottom: 2px solid rgba(0,0,0,0.2);
            background-color: #2d3748;
        }

        .game-info { padding: 15px; text-align: center; }
        .game-info h3 { margin: 0; font-size: 1.1rem; }
        .game-info p { margin: 5px 0 0; font-size: 0.85rem; opacity: 0.5; }

        /* Overlay do Jogo */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            z-index: 1000;
            flex-direction: column;
        }

        .nav-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: #1e293b;
        }

        .close-btn {
            background: #ef4444; color: white; border: none;
            padding: 8px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        iframe { flex-grow: 1; border: none; width: 95%; margin: 10px auto; border-radius: 12px; }

        /* Estilos do Formulário Modal */
        #form-modal {
            justify-content: center;
            align-items: center;
        }

        .form-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.1);
        }

        .form-container h2 { margin-top: 0; color: var(--primary); text-align: center; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; }
        .form-group input {
            width: 100%; padding: 10px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: var(--bg); color: white; box-sizing: border-box;
        }

        .form-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-submit { background: var(--primary); color: #000; flex: 1; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: transparent; color: white; flex: 1; border: 1px solid #ef4444; padding: 10px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>byteZ</h1>
        <p>Acesse os melhores títulos da web em um só lugar.</p>
        <button class="btn-add" onclick="openAddModal()">+ Adicionar Jogo</button>
    </header>

    <div class="game-grid" id="game-grid-container">
        <p style="text-align: center; width: 100%; grid-column: 1 / -1;">Carregando jogos...</p>
    </div>

    <div id="game-overlay" class="overlay">
        <div class="nav-bar">
            <span style="color: var(--primary); font-weight: bold;">byteZ Player</span>
            <button class="close-btn" onclick="closeGame()">SAIR DO JOGO</button>
        </div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <div id="form-modal" class="overlay">
        <div class="form-container">
            <h2>Postar Novo Jogo</h2>
            <form id="add-game-form">
                <div class="form-group">
                    <label>Nome do Jogo</label>
                    <input type="text" id="game-name" required maxlength="30">
                </div>
                <div class="form-group">
                    <label>Categoria (ex: Ação, Puzzle)</label>
                    <input type="text" id="game-category" required maxlength="20">
                </div>
                <div class="form-group">
                    <label>Link da Capa (Imagem)</label>
                    <input type="url" id="game-thumb-url" required placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Link do Jogo</label>
                    <input type="url" id="game-url" required placeholder="https://...">
                </div>
                <div class="form-buttons">
                    <button type="button" class="btn-cancel" onclick="closeAddModal()">Cancelar</button>
                    <button type="submit" class="btn-submit">Publicar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        // 1. Importações do Firebase SDK v9
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 2. Configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDIh-GgqeniM2HQqllJnE1lekZmdqPs2vw",
            authDomain: "bytez-fb71a.firebaseapp.com",
            projectId: "bytez-fb71a",
            storageBucket: "bytez-fb71a.firebasestorage.app",
            messagingSenderId: "401836877835",
            appId: "1:401836877835:web:2ef26b9bf8cb759302bf0e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 3. Palavras Bloqueadas
        const blockedWords = [
            "hackeado", "hacked", "hack3ado", "h4ckeado", 
            "deface", "defaced", "pwned", "owned", 
            "vandalismo", "vandalizado", "invadido", "invadida"
        ];

        // Função para checar palavras bloqueadas
        function hasBlockedWords(text) {
            const lowerText = text.toLowerCase();
            return blockedWords.some(word => lowerText.includes(word));
        }

        // 4. Funções Globais (Tornando acessíveis no HTML)
        window.openGame = (url) => {
            const overlay = document.getElementById('game-overlay');
            const iframe = document.getElementById('game-frame');
            iframe.src = url;
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        window.closeGame = () => {
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('game-frame').src = ''; 
            document.body.style.overflow = 'auto';
        }

        window.openAddModal = () => {
            document.getElementById('form-modal').style.display = 'flex';
        }

        window.closeAddModal = () => {
            document.getElementById('form-modal').style.display = 'none';
            document.getElementById('add-game-form').reset();
        }

        // 5. Carregar Jogos do Banco de Dados
        async function loadGames() {
            const grid = document.getElementById('game-grid-container');
            grid.innerHTML = ''; // Limpa o "Carregando..."

            try {
                const q = query(collection(db, "games"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    grid.innerHTML = '<p style="text-align: center; width: 100%; grid-column: 1 / -1;">Nenhum jogo postado ainda. Seja o primeiro!</p>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const game = doc.data();
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.onclick = () => window.openGame(game.url);
                    
                    card.innerHTML = `
                        <div class="game-thumb" style="background-image: url('${game.thumb}')"></div>
                        <div class="game-info">
                            <h3>${game.name}</h3>
                            <p>${game.category}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error("Erro ao carregar jogos: ", error);
                grid.innerHTML = '<p style="color: red; text-align: center; grid-column: 1 / -1;">Erro ao carregar a lista de jogos.</p>';
            }
        }

        // 6. Lógica de Postagem (Submit do Formulário)
        document.getElementById('add-game-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Verificação de Limite de 1 post por dia (24h = 86400000 ms)
            const lastPostTime = localStorage.getItem('bytez_last_post');
            if (lastPostTime) {
                const timePassed = Date.now() - parseInt(lastPostTime);
                if (timePassed < 86400000) {
                    alert('Você já postou um jogo hoje! Volte amanhã para postar mais.');
                    return;
                }
            }

            const name = document.getElementById('game-name').value;
            const category = document.getElementById('game-category').value;
            const thumb = document.getElementById('game-thumb-url').value;
            const url = document.getElementById('game-url').value;

            // Verificação de Palavras Bloqueadas
            if (hasBlockedWords(name) || hasBlockedWords(category)) {
                alert('Atenção: O nome ou a categoria contém palavras que não são permitidas em nossa comunidade.');
                return;
            }

            try {
                // Adiciona no Firebase
                await addDoc(collection(db, "games"), {
                    name: name,
                    category: category,
                    thumb: thumb,
                    url: url,
                    createdAt: serverTimestamp()
                });

                // Salva a hora do post no LocalStorage
                localStorage.setItem('bytez_last_post', Date.now());

                alert('Jogo postado com sucesso!');
                window.closeAddModal();
                loadGames(); // Recarrega a grid para mostrar o novo jogo

            } catch (error) {
                console.error("Erro ao adicionar documento: ", error);
                alert('Erro ao postar o jogo. Tente novamente.');
            }
        });

        // Inicializa carregando os jogos quando a página abre
        loadGames();

    </script>
</body>
</html>
